<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortune-Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
         :root {
            --bg-main: #f0dc2e;
            --bg-card: #121212;
            --bg-card-soft: #222;
            --bg-card-muted: #2f2f2f;
            --border-main: #f5df21;
            --text-main: #f8e93f;
            --text-dark: #151515;
            --text-muted: #b9b9b9;
            --text-soft: #ffdf64;
            --pending: #ffb020;
            --confirmed: #57e06d;
            --danger: #d35858;
            --radius-sm: 0.5rem;
            --radius-md: 0.75rem;
            --space-1: 0.5rem;
            --space-2: 0.75rem;
            --space-3: 1rem;
            --space-4: 1.25rem;
            --space-5: 1.5rem;
        }
        
        * {
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            background: var(--bg-main);
            color: var(--text-main);
            font-size: 16px;
            line-height: 1.45;
        }
        
        .header {
            position: relative;
            background-color: var(--bg-card);
        }
        
        .header-menu {
            position: absolute;
            top: var(--space-3);
            right: var(--space-3);
            z-index: 3000;
        }
        
        .table-header {
            background-color: var(--bg-card-muted);
            color: var(--text-main);
            font-weight: 700;
        }
        
        .table-row-odd {
            background-color: #101010;
            color: var(--text-main);
        }
        
        .table-row-even {
            background-color: #1a1a1a;
            color: var(--text-main);
        }
        
        .btn-primary,
        .btn-secondary,
        .menu-btn,
        .menu-link,
        .close-btn {
            min-height: 44px;
        }
        
        .btn-primary {
            background-color: var(--border-main);
            color: var(--text-dark);
            font-weight: 700;
            border-radius: var(--radius-sm);
            padding: 0.625rem 1rem;
            border: 1px solid transparent;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.2s ease;
        }
        
        .btn-primary:hover {
            background-color: #fff05f;
            transform: translateY(-1px);
        }
        
        .btn-secondary {
            background-color: #5f5f5f;
            color: var(--text-main);
            font-weight: 700;
            border-radius: var(--radius-sm);
            padding: 0.625rem 1rem;
            border: 1px solid transparent;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }
        
        .btn-secondary:hover {
            background-color: #727272;
        }
        
        .input-date,
        .admin-input {
            background-color: #333;
            color: var(--text-main);
            border: 1px solid var(--border-main);
            border-radius: var(--radius-sm);
            padding: 0.7rem 0.8rem;
            font-weight: 600;
            font-size: 0.95rem;
            width: 100%;
            min-height: 44px;
        }
        
        .input-date::placeholder {
            color: #a4a4a4;
        }
        
        .section-title {
            color: var(--text-dark);
            font-weight: 800;
            font-size: clamp(1.05rem, 2.2vw, 1.7rem);
            padding: 0.65rem 0.8rem;
            background-color: var(--border-main);
            border-radius: var(--radius-sm);
        }
        
        .field-label {
            color: var(--danger);
            font-weight: 700;
            font-size: 1rem;
        }
        
        .scrollable-table {
            width: 100%;
            overflow-x: hidden;
        }
        
        .table-cell-pending {
            opacity: 0.85;
            font-style: italic;
            color: var(--pending);
        }
        
        .table-cell-confirmed {
            font-weight: 700;
            color: var(--confirmed);
        }
        
        table {
            border-collapse: collapse;
            width: 100%;
            table-layout: fixed;
        }
        
        th,
        td {
            border: 1px solid var(--border-main);
            padding: 0.55rem 0.45rem;
            text-align: center;
            font-size: clamp(0.72rem, 1.45vw, 0.95rem);
            word-break: break-word;
            white-space: normal;
        }
        
        th {
            background-color: var(--bg-card-muted);
            color: var(--text-main);
            font-weight: 700;
        }
        
        .close-btn {
            background-color: var(--border-main);
            color: var(--text-dark);
            border: none;
            border-radius: var(--radius-sm);
            padding: 0.2rem 0.65rem;
            cursor: pointer;
            font-weight: 700;
            font-size: 1.1rem;
        }
        
        .close-btn:hover {
            background-color: #fff05f;
        }
        
        .modal-overlay {
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.74);
            display: none;
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: var(--space-3);
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal-content {
            background-color: #1a1a1a;
            border: 2px solid var(--border-main);
            border-radius: var(--radius-md);
            padding: clamp(1rem, 2vw, 1.25rem);
            width: min(100%, 980px);
            max-height: 90vh;
            overflow-y: auto;
            color: var(--text-main);
        }
        
        .header-clock-box {
            min-height: 44px;
            min-width: 148px;
            text-align: center;
            padding: 0.6rem 0.55rem;
            border: 1px solid var(--border-main);
            border-radius: var(--radius-sm);
            background-color: #101010;
            color: var(--text-main);
            font-weight: 700;
            font-size: clamp(0.78rem, 1.9vw, 0.92rem);
            line-height: 1.2;
        }
        
        .menu-btn {
            background-color: #333;
            color: var(--text-main);
            border: 1px solid var(--border-main);
            border-radius: var(--radius-sm);
            padding: 0.55rem 0.8rem;
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            line-height: 1;
        }
        
        .menu-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 0.5rem;
            min-width: 11.5rem;
            background-color: #1a1a1a;
            border: 1px solid var(--border-main);
            border-radius: var(--radius-md);
            padding: 0.5rem;
            display: none;
            z-index: 3001;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
        }
        
        .menu-dropdown.active {
            display: block;
        }
        
        .menu-link {
            width: 100%;
            display: block;
            text-align: left;
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid transparent;
            border-radius: var(--radius-sm);
            padding: 0.62rem 0.7rem;
            font-weight: 700;
            font-size: 0.95rem;
            text-decoration: none;
            cursor: pointer;
        }
        
        .menu-link:hover {
            background-color: var(--bg-card-muted);
            border-color: var(--border-main);
        }
        
        .hidden {
            display: none;
        }
        
        @media (max-width: 900px) {
            .admin-top {
                flex-direction: column;
                align-items: flex-start;
            }
            .admin-top .relative {
                align-self: flex-end;
            }
            .modal-actions {
                flex-wrap: wrap;
                justify-content: stretch;
            }
            .modal-actions .btn-primary,
            .modal-actions .btn-secondary {
                flex: 1 1 220px;
            }
            .user-actions {
                align-items: stretch;
            }
        }
        
        @media (max-width: 768px) {
            body {
                padding: var(--space-2);
            }
            .header {
                padding: var(--space-3);
            }
            .header-menu {
                top: var(--space-2);
                right: var(--space-2);
            }
            .header-tools {
                width: 100%;
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: var(--space-1);
                align-items: center;
                padding-right: 4.25rem;
            }
            .header-caption {
                font-size: 1.02rem;
            }
            .filter-grid {
                grid-template-columns: 1fr;
            }
            .filter-actions,
            .user-actions {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: var(--space-1);
            }
            .record-count {
                text-align: left;
            }
            .header-clock-box {
                min-width: 0;
                width: 100%;
            }
            .menu-btn {
                width: 54px;
                height: 44px;
                padding: 0;
            }
            .menu-dropdown {
                min-width: 10rem;
            }
            th,
            td {
                padding: 0.42rem 0.3rem;
                font-size: 0.72rem;
            }
        }
        
        @media (max-width: 420px) {
            th,
            td {
                padding: 0.38rem 0.22rem;
                font-size: 0.65rem;
                line-height: 1.2;
            }
        }
        
        @media (max-width: 460px) {
            .header-tools {
                grid-template-columns: 1fr;
                padding-right: 0;
                margin-top: 0.25rem;
            }
            .filter-actions,
            .user-actions {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body class="p-4 md:p-6">
    <!-- Header -->
    <div class="header rounded-lg mb-6 p-6 shadow-lg">
        <div class="header-menu">
            <button id="topMenuBtn" class="menu-btn" onclick="toggleTopMenu()">☰</button>
            <div id="topMenuDropdown" class="menu-dropdown">
                <button class="menu-link" onclick="openAdminAuthModal(); closeTopMenu();">Admin Panel</button>
                <a class="menu-link" href="record.html" onclick="closeTopMenu()">Record Page</a>
            </div>
        </div>
        <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-4 pr-16 md:pr-20">
            <h1 class="text-2xl md:text-4xl font-bold leading-tight" style="color: #FFFF00;">🎰 Test Your Fortune</h1>
            <div class="header-tools flex flex-wrap items-center gap-2 md:gap-3">
                <div id="liveDate" class="header-clock-box">--/--/----</div>
                <div id="liveTime" class="header-clock-box">--:--:-- --</div>
            </div>
        </div>
        <p class="text-gray-400 mt-2 header-caption">Check your lucky numbers</p>
    </div>

    <!-- Admin Password Modal -->
    <div id="adminAuthModal" class="modal-overlay">
        <div class="modal-content" style="width: 420px; max-width: 92%;">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold">Admin Authentication</h2>
                <button class="close-btn" onclick="closeAdminAuthModal()">✕</button>
            </div>

            <form onsubmit="submitAdminPassword(event)">
                <label class="block text-sm mb-2">Enter admin password</label>
                <input id="adminPasswordInput" type="password" class="admin-input w-full mb-4" placeholder="Password" autocomplete="current-password">

                <div class="flex justify-end gap-3">
                    <button type="button" class="btn-secondary" onclick="closeAdminAuthModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Unlock</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Show Result Section -->
    <div class="bg-black rounded-lg mb-6 p-6 border-2" style="border-color: #FFFF00;">
        <div class="section-title mb-4">📅 Show Result</div>
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end filter-grid">
            <div>
                <label class="block mb-2 field-label">Start Date</label>
                <input type="date" id="startDate" class="input-date w-full" value="">
            </div>
            <div>
                <label class="block mb-2 field-label">End Date</label>
                <input type="date" id="endDate" class="input-date w-full" value="">
            </div>
            <div class="flex gap-2 filter-actions">
                <button class="btn-primary flex-1 md:flex-none" onclick="filterResults()">Go</button>
                <button class="btn-secondary flex-1 md:flex-none" onclick="resetFilter()">Reset</button>
            </div>
            <div class="text-right record-count">
                <span id="recordCount" class="font-bold" style="color: #FFFF00;"></span>
            </div>
        </div>
    </div>

    <!-- Results Table -->
    <div class="bg-black rounded-lg p-4 md:p-6 border-2 shadow-lg" style="border-color: #FFFF00;">
        <div class="section-title mb-4">📊 Results Table</div>
        <div class="scrollable-table">
            <table class="results-table">
                <thead>
                    <tr class="table-header">
                        <th>Date</th>
                        <th>Time</th>
                        <th>Andar</th>
                        <th>Result</th>
                        <th>Bahar</th>
                    </tr>
                </thead>
                <tbody id="resultsTable">
                    <!-- Table rows will be generated by JavaScript -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Admin Panel Modal -->
    <div id="adminModal" class="modal-overlay">
        <div class="modal-content">
            <div class="flex justify-between items-start mb-6 gap-3 admin-top">
                <h2 class="text-2xl font-bold">Admin Panel</h2>
                <div class="relative">
                    <button class="close-btn" onclick="toggleAdminPanel()" title="Close admin panel">✕</button>
                    <button id="adminMenuBtn" class="menu-btn" onclick="toggleAdminMenu()">☰</button>
                    <div id="adminMenuDropdown" class="menu-dropdown">
                        <button class="menu-link" onclick="toggleUserManagementSection(); closeAdminMenu();">Manage Record User</button>
                    </div>
                </div>
            </div>

            <!-- Date, Time and Result Input -->
            <div class="mb-6 p-4 rounded" style="background-color: #2d2d2d; border: 1px solid #FFFF00;">
                <label class="block font-bold mb-2">Add Result</label>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                    <div>
                        <label class="block text-sm mb-1">Date</label>
                        <input type="date" id="adminDate" class="admin-input w-full" onchange="syncAdminTimeToDate()">
                    </div>
                    <div>
                        <label class="block text-sm mb-1">Next Upcoming Time</label>
                        <input type="text" id="adminTime" class="admin-input w-full" readonly>
                    </div>
                    <div>
                        <label class="block text-sm mb-1">Result</label>
                        <input type="text" id="result" class="admin-input w-full" maxlength="2" placeholder="00" inputmode="numeric">
                    </div>
                </div>
                <div class="text-sm" style="color:#FFDD66;">Time is chosen automatically as the next upcoming slot for the selected date.</div>
                <div class="mt-3">
                    <button class="btn-primary w-full md:w-auto" onclick="saveAdminData()">Save Result</button>
                </div>
            </div>

            <!-- User Management -->
            <div id="userManagementSection" class="mb-6 p-4 rounded hidden" style="background-color: #2d2d2d; border: 1px solid #FFFF00;">
                <label class="block font-bold mb-3">Manage Record Users</label>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-3">
                    <div>
                        <label class="block text-sm mb-1">Username</label>
                        <input type="text" id="userNameInput" class="admin-input w-full" placeholder="counter4">
                    </div>
                    <div>
                        <label class="block text-sm mb-1">Password</label>
                        <input type="text" id="userPasswordInput" class="admin-input w-full" placeholder="password">
                    </div>
                    <div class="flex items-end gap-2 user-actions">
                        <button class="btn-primary w-full" onclick="saveUserCredentials()">Add / Update</button>
                        <button class="btn-secondary w-full" onclick="deleteUserCredentials()">Delete</button>
                    </div>
                </div>
                <div id="userList" style="max-height: 120px; overflow-y: auto; font-size: 12px;"></div>
            </div>

            <!-- Stored Data Preview -->
            <div class="mt-6 p-4 rounded" style="background-color: #2d2d2d; border: 1px solid #FFFF00;">
                <label class="block font-bold mb-2">Stored Data</label>
                <div id="storedDataPreview" style="max-height: 300px; overflow-y: auto; font-size: 12px;">
                    <!-- Data list will be populated by JavaScript -->
                </div>
            </div>
        </div>
    </div>

    <script>
        (function startHeaderClockFallback() {
            const dateNode = document.getElementById('liveDate');
            const timeNode = document.getElementById('liveTime');
            if (!dateNode || !timeNode) {
                return;
            }

            function renderClock() {
                const now = new Date();
                const day = String(now.getDate()).padStart(2, '0');
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const year = now.getFullYear();

                let hour = now.getHours();
                const minute = String(now.getMinutes()).padStart(2, '0');
                const second = String(now.getSeconds()).padStart(2, '0');
                const ampm = hour >= 12 ? 'PM' : 'AM';

                hour = hour % 12;
                if (hour === 0) {
                    hour = 12;
                }

                dateNode.textContent = `${day}/${month}/${year}`;
                timeNode.textContent = `${String(hour).padStart(2, '0')}:${minute}:${second} ${ampm}`;
            }

            renderClock();
            setInterval(renderClock, 1000);
        })();
    </script>
    <script src="app.js?v=20260417-03"></script>
</body>

</html>

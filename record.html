<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lottery Record Page</title>
    <style>
         :root {
            --bg-main: #f0dc2e;
            --bg-card: #111;
            --bg-card-soft: #222;
            --bg-card-muted: #2d2d2d;
            --border-main: #f5df21;
            --text-main: #f8e93f;
            --text-dark: #151515;
            --text-soft: #ffdf64;
            --danger: #ff8787;
            --radius-sm: 0.5rem;
            --radius-md: 0.75rem;
            --space-1: 0.5rem;
            --space-2: 0.75rem;
            --space-3: 1rem;
            --space-4: 1.25rem;
        }
        
        * {
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            background: var(--bg-main);
            color: var(--text-main);
            padding: clamp(0.65rem, 2vw, 1rem);
            line-height: 1.4;
        }
        
        .card {
            background: var(--bg-card);
            border: 2px solid var(--border-main);
            border-radius: var(--radius-md);
            padding: clamp(0.85rem, 2vw, 1.1rem);
            margin-bottom: var(--space-3);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.2);
        }
        
        .title {
            margin: 0 0 var(--space-2);
            font-size: clamp(1.1rem, 3vw, 1.6rem);
            color: var(--text-main);
            font-weight: 800;
        }
        
        .input,
        .record-input {
            width: 100%;
            min-height: 38px;
            padding: 0.45rem 0.62rem;
            border: 1px solid var(--border-main);
            border-radius: var(--radius-sm);
            background: var(--bg-card-soft);
            color: var(--text-main);
            margin-bottom: var(--space-2);
            font-weight: 700;
            font-size: 0.9rem;
        }
        
        .btn {
            min-height: 38px;
            padding: 0.45rem 0.8rem;
            border: 1px solid var(--border-main);
            border-radius: var(--radius-sm);
            background: var(--border-main);
            color: var(--text-dark);
            font-weight: 800;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.88rem;
        }
        
        .btn-secondary {
            background: #333;
            color: var(--text-main);
        }
        
        .btn-danger {
            background: #7a1b1b;
            color: #ffe7e7;
            border-color: #c53d3d;
        }
        
        .row-actions {
            display: flex;
            gap: var(--space-1);
            flex-wrap: wrap;
            align-items: center;
        }
        
        .records-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.6rem;
        }
        
        .close-icon-btn {
            min-height: 38px;
            min-width: 38px;
            width: 38px;
            padding: 0;
            border: 1px solid #c53d3d;
            border-radius: var(--radius-sm);
            background: #7a1b1b;
            color: #ffe7e7;
            font-weight: 900;
            font-size: 1rem;
            line-height: 1;
            cursor: pointer;
        }
        
        .close-icon-btn:hover {
            background: #8f2222;
        }
        
        .hint {
            color: var(--text-soft);
            font-size: 0.82rem;
            margin: 0;
        }
        
        .error {
            color: var(--danger);
            margin-top: var(--space-1);
            font-weight: 700;
            min-height: 1rem;
        }
        
        .hidden {
            display: none;
        }
        
        .records-scroll {
            border: 1px solid var(--border-main);
            border-radius: var(--radius-sm);
            overflow: hidden;
        }
        
        .records-grid {
            width: 100%;
        }
        
        .records-header,
        .records-row {
            display: grid;
            grid-template-columns: 120px 104px repeat(4, minmax(0, 1fr));
            gap: 0.4rem;
            align-items: center;
            padding: 0.55rem;
            border-bottom: 1px solid #444;
        }
        
        .records-header {
            background: var(--bg-card-muted);
            font-weight: 700;
        }
        
        .records-row:nth-child(odd) {
            background: #181818;
        }
        
        .records-cell {
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--text-main);
            text-align: center;
        }
        
        .record-input {
            margin-bottom: 0;
            text-align: center;
        }
        
        .admin-table-wrap {
            overflow-x: auto;
            border: 1px solid var(--border-main);
            border-radius: var(--radius-sm);
        }
        
        .admin-table {
            width: 100%;
            min-width: 760px;
            border-collapse: collapse;
        }
        
        .admin-table th,
        .admin-table td {
            border: 1px solid var(--border-main);
            padding: 0.45rem;
            text-align: center;
            font-size: 0.82rem;
            color: var(--text-main);
        }
        
        .admin-table th {
            background: var(--bg-card-muted);
            white-space: nowrap;
        }
        
        @media (max-width: 700px) {
            .records-scroll {
                border: 0;
                border-radius: 0;
                overflow: visible;
            }
            .records-header {
                display: none;
            }
            .records-row {
                grid-template-columns: 1fr;
                border: 1px solid var(--border-main);
                border-radius: var(--radius-sm);
                margin-bottom: var(--space-2);
            }
            .records-row .records-cell {
                display: flex;
                justify-content: space-between;
                text-align: left;
                border-bottom: 1px solid rgba(245, 223, 33, 0.25);
                padding-bottom: 0.3rem;
            }
            .records-row .records-cell::before {
                content: attr(data-label);
                color: var(--text-soft);
                font-weight: 700;
            }
            .row-actions {
                display: grid;
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="card" id="loginCard">
        <h2 class="title">Record Login</h2>
        <input id="loginUser" class="input" type="text" placeholder="Username">
        <input id="loginPass" class="input" type="password" placeholder="Password">
        <div class="row-actions">
            <button class="btn" onclick="loginPortalUser()">Login</button>
            <a class="btn btn-secondary" href="index.html">Back to Dashboard</a>
        </div>
        <p id="loginMsg" class="error"></p>
    </div>

    <div id="recordsSection" class="card hidden">
        <div class="records-head">
            <h2 class="title" style="margin: 0;">Record Page</h2>
            <button class="close-icon-btn" onclick="logoutRecordUser()" aria-label="Close record page">X</button>
        </div>

        <div class="row-actions" style="margin-bottom: 10px;">
            <button id="recordSaveBtn" class="btn" onclick="saveRecordInputs()">Save Record Data</button>
            <button id="refreshAdminBtn" class="btn btn-secondary hidden" onclick="renderAdminDashboard()">Refresh</button>
        </div>

        <p id="welcomeText" class="hint"></p>

        <div id="adminDashboard" class="hidden">
            <div class="admin-table-wrap">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Date</th>
                            <th>Time</th>
                            <th>Block 1</th>
                            <th>Block 2</th>
                            <th>Block 3</th>
                            <th>Block 4</th>
                        </tr>
                    </thead>
                    <tbody id="adminRecordRows"></tbody>
                </table>
            </div>
            <p class="hint" style="margin-top: 8px;">Admin view shows all counters together.</p>
        </div>

        <div id="userRecordsWrap" class="records-scroll">
            <div class="records-grid">
                <div class="records-header">
                    <div class="records-cell">Date</div>
                    <div class="records-cell">Time</div>
                    <div class="records-cell">Block 1</div>
                    <div class="records-cell">Block 2</div>
                    <div class="records-cell">Block 3</div>
                    <div class="records-cell">Block 4</div>
                </div>
                <div id="recordRows"></div>
            </div>
        </div>
    </div>

    <script src="shared-sync.js"></script>
    <script>
        const sharedReady = (window.SharedStateSync && typeof window.SharedStateSync.init === 'function') ?
            window.SharedStateSync.init().catch((error) => {
                console.warn('Shared sync init failed:', error);
            }) :
            Promise.resolve();

        function formatDateDisplay(dateString) {
            const parts = dateString.split('-');
            return parts.length === 3 ? `${parts[2]}/${parts[1]}/${parts[0]}` : dateString;
        }

        function formatTimeDisplay(time24) {
            const parts = time24.split(':');
            if (parts.length !== 2) return time24;
            let hour = Number(parts[0]);
            const minute = parts[1];
            const ampm = hour >= 12 ? 'PM' : 'AM';
            hour = hour % 12;
            if (hour === 0) hour = 12;
            return `${String(hour).padStart(2, '0')}:${minute} ${ampm}`;
        }

        function getRecordUsers() {
            const stored = localStorage.getItem('lotteryRecordUsers');
            if (!stored) {
                return {
                    counter1: 'counter1',
                    counter2: 'counter2',
                    counter3: 'counter3',
                };
            }
            try {
                const parsed = JSON.parse(stored);
                if (parsed && typeof parsed === 'object') return parsed;
            } catch (e) {
                console.error(e);
            }
            return {};
        }

        function getSortedResultRows() {
            const raw = localStorage.getItem('lotteryResults');
            const data = raw ? JSON.parse(raw) : {};
            const rows = [];

            Object.entries(data).forEach(([date, slots]) => {
                Object.keys(slots).forEach((time) => {
                    rows.push({
                        date,
                        time,
                        key: `${date}|${time}`
                    });
                });
            });

            rows.sort((a, b) => {
                const d = a.date.localeCompare(b.date);
                if (d !== 0) return d;
                return a.time.localeCompare(b.time);
            });

            return rows;
        }

        function getRowDateTime(row) {
            const [year, month, day] = row.date.split('-').map(Number);
            const [hour, minute] = row.time.split(':').map(Number);
            return new Date(year, month - 1, day, hour, minute, 0, 0);
        }

        function getUpcomingRow(rows) {
            if (!rows || rows.length === 0) {
                return null;
            }

            const now = new Date();
            for (const row of rows) {
                if (getRowDateTime(row) >= now) {
                    return row;
                }
            }

            return null;
        }

        function getUserRecords(username) {
            const key = `lotteryRecordData_${username}`;
            const raw = localStorage.getItem(key);
            if (!raw) return {};
            try {
                const parsed = JSON.parse(raw);
                return parsed && typeof parsed === 'object' ? parsed : {};
            } catch (e) {
                console.error(e);
                return {};
            }
        }

        function saveUserRecords(username, data) {
            localStorage.setItem(`lotteryRecordData_${username}`, JSON.stringify(data));
        }

        function getAllRecordData() {
            return Object.keys(localStorage)
                .filter((key) => key.startsWith('lotteryRecordData_'))
                .map((key) => ({
                    user: key.replace('lotteryRecordData_', ''),
                    data: getUserRecords(key.replace('lotteryRecordData_', '')),
                }));
        }

        async function loginPortalUser() {
            await sharedReady;

            const username = document.getElementById('loginUser').value.trim();
            const password = document.getElementById('loginPass').value.trim();
            const loginMsg = document.getElementById('loginMsg');

            loginMsg.textContent = '';

            if (!username || !password) {
                loginMsg.textContent = 'Enter username and password.';
                return;
            }

            if (username.toLowerCase() === 'admin' && password === 'admin123') {
                localStorage.setItem('lotteryRecordSessionUser', JSON.stringify({
                    username: 'admin',
                    role: 'admin',
                }));
                showRecords();
                return;
            }

            const users = getRecordUsers();
            if (users[username] && users[username] === password) {
                localStorage.setItem('lotteryRecordSessionUser', JSON.stringify({
                    username,
                    role: 'counter',
                }));
                showRecords();
                return;
            }

            loginMsg.textContent = 'Invalid username or password.';
        }

        function logoutRecordUser() {
            localStorage.removeItem('lotteryRecordSessionUser');
            document.getElementById('recordsSection').classList.add('hidden');
            document.getElementById('loginCard').classList.remove('hidden');
            document.getElementById('loginUser').value = '';
            document.getElementById('loginPass').value = '';
            document.getElementById('loginMsg').textContent = '';
        }

        function renderRecordRows(username) {
            const rowsNode = document.getElementById('recordRows');
            rowsNode.innerHTML = '';
            rowsNode.removeAttribute('data-current-key');

            const resultRows = getSortedResultRows();
            const userData = getUserRecords(username);

            if (resultRows.length === 0) {
                rowsNode.innerHTML = '<div class="records-row"><div class="records-cell" data-label="Info">No result rows available yet.</div></div>';
                return;
            }

            const upcoming = getUpcomingRow(resultRows);
            if (!upcoming) {
                rowsNode.innerHTML = '<div class="records-row"><div class="records-cell" data-label="Info">No upcoming row found.</div></div>';
                return;
            }

            const entry = userData[upcoming.key] || {
                block1: '',
                block2: '',
                block3: '',
                block4: '',
            };

            rowsNode.setAttribute('data-current-key', upcoming.key);

            const wrapper = document.createElement('div');
            wrapper.className = 'records-row';
            wrapper.innerHTML = `
                <div class="records-cell" data-label="Date">${formatDateDisplay(upcoming.date)}</div>
                <div class="records-cell" data-label="Time">${formatTimeDisplay(upcoming.time)}</div>
                <div class="records-cell" data-label="Block 1"><input class="record-input" id="${upcoming.key}_block1" maxlength="8" value="${entry.block1 || ''}"></div>
                <div class="records-cell" data-label="Block 2"><input class="record-input" id="${upcoming.key}_block2" maxlength="8" value="${entry.block2 || ''}"></div>
                <div class="records-cell" data-label="Block 3"><input class="record-input" id="${upcoming.key}_block3" maxlength="8" value="${entry.block3 || ''}"></div>
                <div class="records-cell" data-label="Block 4"><input class="record-input" id="${upcoming.key}_block4" maxlength="8" value="${entry.block4 || ''}"></div>
            `;
            rowsNode.appendChild(wrapper);
        }

        function renderAdminDashboard() {
            const body = document.getElementById('adminRecordRows');
            body.innerHTML = '';

            const allRows = getSortedResultRows();
            const allCounterUsers = getRecordUsers();

            if (allRows.length === 0) {
                body.innerHTML = '<tr><td colspan="7" class="records-cell">No time slots available.</td></tr>';
                return;
            }

            // Get only the next upcoming time slot
            const upcomingRow = getUpcomingRow(allRows);

            if (!upcomingRow) {
                body.innerHTML = '<tr><td colspan="7" class="records-cell">No upcoming times available.</td></tr>';
                return;
            }

            // Show all counter users' data for this single upcoming time slot (even if no data entered)
            Object.keys(allCounterUsers).forEach((username) => {
                const userRecords = getUserRecords(username);
                const rowData = userRecords[upcomingRow.key] || {
                    block1: '',
                    block2: '',
                    block3: '',
                    block4: '',
                };

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${username}</td>
                    <td>${formatDateDisplay(upcomingRow.date)}</td>
                    <td>${formatTimeDisplay(upcomingRow.time)}</td>
                    <td>${rowData.block1 || '--'}</td>
                    <td>${rowData.block2 || '--'}</td>
                    <td>${rowData.block3 || '--'}</td>
                    <td>${rowData.block4 || '--'}</td>
                `;
                body.appendChild(tr);
            });
        }

        function saveRecordInputs() {
            const sessionRaw = localStorage.getItem('lotteryRecordSessionUser');
            if (!sessionRaw) {
                alert('Session expired. Please login again.');
                return;
            }

            const session = JSON.parse(sessionRaw);
            if (session.role !== 'counter') {
                alert('Admin view is read-only on record page.');
                return;
            }

            const rowsNode = document.getElementById('recordRows');
            const currentKey = rowsNode ? rowsNode.getAttribute('data-current-key') : '';

            if (!currentKey) {
                alert('No upcoming record row to save right now.');
                return;
            }

            const next = getUserRecords(session.username);

            function getFieldValue(id) {
                const node = document.getElementById(id);
                return node ? node.value.trim() : '';
            }

            next[currentKey] = {
                block1: getFieldValue(`${currentKey}_block1`),
                block2: getFieldValue(`${currentKey}_block2`),
                block3: getFieldValue(`${currentKey}_block3`),
                block4: getFieldValue(`${currentKey}_block4`),
            };

            saveUserRecords(session.username, next);
            alert('Record data saved.');
        }

        async function showRecords() {
            await sharedReady;

            const sessionRaw = localStorage.getItem('lotteryRecordSessionUser');
            if (!sessionRaw) {
                return;
            }

            const session = JSON.parse(sessionRaw);
            const isAdmin = session.role === 'admin';

            document.getElementById('loginCard').classList.add('hidden');
            document.getElementById('recordsSection').classList.remove('hidden');

            document.getElementById('welcomeText').textContent = isAdmin ?
                'Admin mode: all counters chart.' :
                `Logged in as ${session.username}.`;

            document.getElementById('adminDashboard').classList.toggle('hidden', !isAdmin);
            document.getElementById('refreshAdminBtn').classList.toggle('hidden', !isAdmin);
            document.getElementById('recordSaveBtn').classList.toggle('hidden', isAdmin);
            document.getElementById('userRecordsWrap').classList.toggle('hidden', isAdmin);

            if (isAdmin) {
                renderAdminDashboard();
            } else {
                renderRecordRows(session.username);
            }
        }

        window.addEventListener('DOMContentLoaded', async() => {
            await sharedReady;

            const sessionRaw = localStorage.getItem('lotteryRecordSessionUser');
            if (sessionRaw) {
                try {
                    await showRecords();
                } catch (e) {
                    console.error(e);
                    logoutRecordUser();
                }
            }
        });
    </script>
</body>

</html>
